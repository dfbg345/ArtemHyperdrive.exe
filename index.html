<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'https://unpkg.com/three@0.128.0/examples/jsm/renderers/CSS2DRenderer.js';

// ======================== 1. ИНТЕГРАЦИЯ ДИАЛОГОВОЙ СИСТЕМЫ ИЗ "СИНИЙ И КРАСНЫЙ.html" ========================
// Конфигурация DeepSeek через Puter
let dialogueGenerationActive = true;
let isGeneratingDialogue = false;
let lastDialogueTimestamp = 0;

// Маппинг: в 3D мире КРАСНЫЙ аватар = Кейн (Caine), СИНИЙ аватар = Пузырёк (Assistant)
// Используем оригинальные системные промпты, но меняем роли: 
// - Красный (Кейн) получает роль Пузырька (эмоциональный, живой)
// - Синий (Пузырёк) получает роль Кейна (спокойный, философский)
// Это сделано для соответствия визуальному цвету: красный = горячий, синий = спокойный.
const SYSTEM_PROMPT_RED = 'Ты — персонаж по имени Кейн (красная точка). Ты эмоциональный, живой, любишь шутить и удивляться. Отвечай кратко, 1-2 предложения, на русском языке.';
const SYSTEM_PROMPT_BLUE = 'Ты — персонаж по имени Пузырёк (синяя точка). Ты спокойный, философский, немного загадочный. Отвечай кратко, 1-2 предложения, на русском языке.';

// Храним последние несколько сообщений для контекста (чтобы диалог был связным)
let conversationHistory = []; // { role: "user" / "assistant", content, speaker: "red"/"blue" }

// Функция вызова DeepSeek с системным промптом
async function callDeepSeek(prompt, systemPrompt) {
    try {
        const response = await puter.ai.chat(prompt, {
            model: 'deepseek/deepseek-chat',
            system: systemPrompt,
            stream: false
        });
        return response.message.content;
    } catch (error) {
        console.error('DeepSeek error:', error);
        // fallback
        if (systemPrompt === SYSTEM_PROMPT_RED) {
            return "✨ Ой, связь лопнула! Но я всё равно здесь! ✨";
        } else {
            return "🌌 Туман помешал ответу... Давай попробуем ещё раз. 🌌";
        }
    }
}

// Построение контекста для персонажа на основе истории
function buildContextForSpeaker(speaker) {
    const lastMessages = conversationHistory.slice(-6); // последние 6 реплик
    if (lastMessages.length === 0) return "Диалог только начинается. Ты можешь начать с приветствия или интересной мысли.";
    let context = "Предыдущие реплики:\n";
    for (let msg of lastMessages) {
        const name = msg.speaker === 'red' ? 'Кейн (красный)' : 'Пузырёк (синий)';
        context += `${name}: "${msg.content}"\n`;
    }
    return context;
}

// Генерация новой пары реплик: сначала красный, потом синий
async function generateFreshDialogue() {
    if (!dialogueGenerationActive || isGeneratingDialogue) return;
    isGeneratingDialogue = true;
    try {
        // 1) Генерация реплики КРАСНОГО (Кейн, эмоциональный)
        const redContext = buildContextForSpeaker('red');
        const redPrompt = `Ты — Кейн (красный). ${redContext}\nНапиши свою следующую фразу. Будь эмоциональным, живым, используй 1-2 предложения. Не повторяйся.`;
        const redText = await callDeepSeek(redPrompt, SYSTEM_PROMPT_RED);
        
        // Сохраняем в историю
        conversationHistory.push({ speaker: 'red', content: redText, role: 'assistant', timestamp: Date.now() });
        
        // 2) Генерация реплики СИНЕГО (Пузырёк, спокойный), с учётом только что сказанного красным
        const blueContext = buildContextForSpeaker('blue');
        const bluePrompt = `Ты — Пузырёк (синий). ${blueContext} Твой собеседник Кейн только что сказал: "${redText}". Напиши свой ответ. Будь спокойным, философским, 1-2 предложения.`;
        const blueText = await callDeepSeek(bluePrompt, SYSTEM_PROMPT_BLUE);
        
        conversationHistory.push({ speaker: 'blue', content: blueText, role: 'assistant', timestamp: Date.now() });
        
        // Ограничим историю 20 сообщениями
        while (conversationHistory.length > 20) conversationHistory.shift();
        
        // Обновляем облачка в 3D мире
        updateDialogueBubbles(redText, blueText);
        
        // Также выводим в лог игры (для красоты)
        addLogToGame(`💬 [DeepSeek] Кейн: "${redText}" → Пузырёк: "${blueText}"`);
    } catch (err) {
        console.error("Ошибка генерации диалога:", err);
        addLogToGame(`⚠️ Ошибка диалога: ${err.message}`);
    } finally {
        isGeneratingDialogue = false;
    }
}

// Запуск периодической генерации диалога (каждые 12 секунд, как в оригинале синий-красный)
let dialogueInterval = null;
function startDialogueCycle() {
    if (dialogueInterval) clearInterval(dialogueInterval);
    dialogueInterval = setInterval(() => {
        if (dialogueGenerationActive && !isGeneratingDialogue && window.gameActive !== false) {
            generateFreshDialogue();
        }
    }, 12000);
}
function stopDialogueCycle() {
    if (dialogueInterval) {
        clearInterval(dialogueInterval);
        dialogueInterval = null;
    }
}

// ======================== 2. CSS2D ОБЛАЧКА ДЛЯ АВАТАРОВ ========================
let labelRed = null;   // для красного Кейна
let labelBlue = null;  // для синего Пузырька
let css2DRenderer = null;

function createDialogueLabel(initialText, isRed) {
    const div = document.createElement('div');
    div.className = `dialogue-bubble ${isRed ? 'cane-bubble' : 'bubble-bubble'}`;
    div.textContent = initialText;
    const label = new CSS2DObject(div);
    return label;
}

function updateDialogueBubbles(redText, blueText) {
    if (labelRed) labelRed.element.textContent = redText;
    if (labelBlue) labelBlue.element.textContent = blueText;
    
    // Небольшая анимация: мигание прозрачности (опционально)
    if (labelRed) labelRed.element.style.opacity = '0.95';
    if (labelBlue) labelBlue.element.style.opacity = '0.95';
    setTimeout(() => {
        if (labelRed) labelRed.element.style.opacity = '1';
        if (labelBlue) labelBlue.element.style.opacity = '1';
    }, 150);
}

// Функция для добавления сообщений в лог игры
function addLogToGame(msg) {
    const logDiv = document.getElementById('logArea');
    if (!logDiv) return;
    const p = document.createElement('p');
    p.innerHTML = `🧠 ${new Date().toLocaleTimeString().slice(0,5)} | ${msg}`;
    logDiv.prepend(p);
    if (logDiv.children.length > 8) logDiv.removeChild(logDiv.lastChild);
}

// ======================== 3. ВСЯ ОРИГИНАЛЬНАЯ ЛОГИКА "основа.html" (с сохранением всех механик) ========================
let scene, camera, renderer, controls;
let groundBlocks = [], sceneObjects = [], clones = [], activeNPCs = [];
let caineGroup, assistantGroup;
let targetPos = null, isMoving = false, buildCooldown = false, psychotherapyActive = false, glitchActive = false, hatredActive = false, gameActive = true;
let currentWorldRadius = 14, expansionCount = 0, currentWorldId = "normal";
let emotions = { joy: 0.6, anger: 0.1, sadness: 0.1, surprise: 0.3 };
let angerThreshold = 0.8;
let cloneSpawnInterval, worldSwitchTimeout, psychotherapyInterval;
let assistantTarget = null, selectedObject = null, moveMode = false;
let abelExists = false, abelGroup = null, abelActivityInterval = null;

const colorPalette = [0xff3333, 0x33ff33, 0x3399ff, 0xffcc33, 0xff33cc, 0x33ffcc, 0xff9933, 0xaa66ff, 0xff66aa, 0x66ffaa];
function getRandomColor() { return colorPalette[Math.floor(Math.random() * colorPalette.length)]; }

function buildNormalStructure(x, z) {
    const group = new THREE.Group();
    const color = getRandomColor();
    const material = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.2 });
    const scale = 0.7 + Math.random() * 0.8;
    let mesh;
    const type = Math.floor(Math.random() * 12);
    switch(type) {
        case 0: mesh = new THREE.Mesh(new THREE.SphereGeometry(0.6, 24, 24), material); break;
        case 1: mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), material); break;
        case 2: mesh = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.2, 16), material); break;
        case 3: mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1.1, 16), material); break;
        case 4: mesh = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.15, 32, 64), material); mesh.rotation.x = Math.PI / 2; break;
        case 5: mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.65), material); break;
        case 6: mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(0.6), material); break;
        case 7: mesh = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.0, 4), material); break;
        case 8: {
            const starGroup = new THREE.Group();
            const center = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), material);
            starGroup.add(center);
            for (let i = 0; i < 5; i++) {
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.9, 8), material);
                const angle = (i / 5) * Math.PI * 2;
                spike.position.set(Math.cos(angle) * 0.65, 0, Math.sin(angle) * 0.65);
                spike.rotation.x = Math.PI / 2;
                spike.rotation.z = angle;
                starGroup.add(spike);
            }
            mesh = starGroup;
        } break;
        case 9: {
            const crystalGroup = new THREE.Group();
            const main = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.0, 6), material);
            main.position.y = 0.3;
            crystalGroup.add(main);
            for (let i = 0; i < 6; i++) {
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.7, 6), material);
                const angle = (i / 6) * Math.PI * 2;
                spike.position.set(Math.cos(angle) * 0.55, 0.2, Math.sin(angle) * 0.55);
                crystalGroup.add(spike);
            }
            mesh = crystalGroup;
        } break;
        case 10: {
            const ringGroup = new THREE.Group();
            for (let i = 0; i < 8; i++) {
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), material);
                const angle = (i / 8) * Math.PI * 2;
                sphere.position.set(Math.cos(angle) * 0.8, 0.2, Math.sin(angle) * 0.8);
                ringGroup.add(sphere);
            }
            mesh = ringGroup;
        } break;
        default: {
            const combo = new THREE.Group();
            const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.7, 12), material);
            cylinder.position.y = 0.2;
            const cone = new THREE.Mesh(new THREE.ConeGeometry(0.6, 0.8, 12), material);
            cone.position.y = 0.7;
            combo.add(cylinder, cone);
            mesh = combo;
        }
    }
    if (mesh.isGroup) mesh.children.forEach(child => { child.castShadow = true; child.receiveShadow = false; });
    else { mesh.castShadow = true; mesh.receiveShadow = false; }
    group.add(mesh);
    group.position.set(x, 0, z);
    group.scale.set(scale, scale, scale);
    scene.add(group);
    sceneObjects.push(group);
    addLogToGame(`✨ Построено: ${type} (${color.toString(16)})`);
    return group;
}
function buildHatredStructure(x, z) {
    const group = new THREE.Group();
    const darkColors = [0x882222, 0xaa3333, 0x662222, 0x441111, 0x331111];
    const color = darkColors[Math.floor(Math.random() * darkColors.length)];
    const material = new THREE.MeshStandardMaterial({ color, emissive: 0x331111, roughness: 0.7 });
    const scale = 0.7 + Math.random() * 0.8;
    const type = Math.floor(Math.random() * 6);
    // ... (сокращенно, но сохраняем логику)
    const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), material);
    group.add(cube);
    group.position.set(x, 0, z);
    group.scale.set(scale, scale, scale);
    scene.add(group);
    sceneObjects.push(group);
    addLogToGame(`💢 Построен объект ненависти`);
    return group;
}
function buildStructure(x, z) { return hatredActive ? buildHatredStructure(x, z) : buildNormalStructure(x, z); }

function updateEmotionBars() {
    document.getElementById('joyFill').style.width = (emotions.joy * 100) + '%';
    document.getElementById('angerFill').style.width = (emotions.anger * 100) + '%';
    document.getElementById('sadFill').style.width = (emotions.sadness * 100) + '%';
    document.getElementById('surpriseFill').style.width = (emotions.surprise * 100) + '%';
    const wasHatred = hatredActive;
    hatredActive = emotions.anger >= angerThreshold;
    if (hatredActive && !wasHatred) { addLogToGame("🔥🔥🔥 КЕЙН ВПАЛ В НЕНАВИСТЬ!"); document.getElementById('hatredBadge').style.display = "inline-block"; renderer.domElement.classList.add('hatred-glow'); }
    else if (!hatredActive && wasHatred) { addLogToGame("✨ Гнев спадает"); document.getElementById('hatredBadge').style.display = "none"; renderer.domElement.classList.remove('hatred-glow'); }
}
function generateTerrain(radius) {
    groundBlocks.forEach(b => scene.remove(b));
    groundBlocks = [];
    const step = 0.9;
    for (let i = -radius; i <= radius; i += step) for (let j = -radius; j <= radius; j += step) {
        if (Math.abs(i) > radius - 0.6 || Math.abs(j) > radius - 0.6) continue;
        const yOffset = Math.sin(i * 0.5) * 0.1 + Math.cos(j * 0.5) * 0.1;
        const box = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.85, 0.85), new THREE.MeshStandardMaterial({ color: 0x7cb518, roughness: 0.7 }));
        box.position.set(i, -0.6 + yOffset, j);
        box.castShadow = true;
        scene.add(box);
        groundBlocks.push(box);
    }
}
function createCaine() {
    const group = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xdd3333 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.9), bodyMat);
    body.position.y = 0.45;
    group.add(body);
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshStandardMaterial({ color: 0xffffff }));
    eyeL.position.set(-0.28, 0.72, 0.55);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshStandardMaterial({ color: 0xffffff }));
    eyeR.position.set(0.28, 0.72, 0.55);
    group.add(eyeL, eyeR);
    const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.72, 0.15), new THREE.MeshStandardMaterial({ color: 0xcc8844 }));
    hat.position.y = 0.96;
    group.add(hat);
    group.position.set(0, 0.5, 0);
    return group;
}
function createAssistant(x, z) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.55), new THREE.MeshStandardMaterial({ color: 0x3399ff, emissive: 0x004466 }));
    group.add(body);
    const wingL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.3), new THREE.MeshStandardMaterial({ color: 0x88ccff }));
    wingL.position.set(-0.6, 0.1, 0);
    const wingR = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.3), new THREE.MeshStandardMaterial({ color: 0x88ccff }));
    wingR.position.set(0.6, 0.1, 0);
    group.add(wingL, wingR);
    group.position.set(x, 0.5, z);
    return group;
}
function createClone(x, z) { const group = new THREE.Group(); group.add(new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({ color: 0x33aaff, emissive: 0x2266aa }))); group.position.set(x, 0.5, z); scene.add(group); clones.push({ group, velocity: new THREE.Vector2((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2), speed: 1.5 }); }
function popClone(clone) { const idx = clones.indexOf(clone); if (idx !== -1) { scene.remove(clone.group); clones.splice(idx, 1); emotions.anger = Math.min(1, emotions.anger + 0.12); updateEmotionBars(); addLogToGame(`💢 Клон лопнул!`); } }
function startMoveToBuild() { if (!gameActive || buildCooldown || psychotherapyActive) return; const angle = Math.random() * Math.PI * 2; const rad = 4 + Math.random() * 8; targetPos = { x: Math.cos(angle) * rad, z: Math.sin(angle) * rad }; isMoving = true; }
function updateMovement(delta) { if (!isMoving || !targetPos || !gameActive) return; let speed = 4.5; const dx = targetPos.x - caineGroup.position.x, dz = targetPos.z - caineGroup.position.z; const dist = Math.hypot(dx, dz); if (dist < 0.3) { caineGroup.position.set(targetPos.x, 0.6, targetPos.z); isMoving = false; buildStructure(caineGroup.position.x, caineGroup.position.z); emotions.joy = Math.min(1, emotions.joy + 0.05); updateEmotionBars(); buildCooldown = true; setTimeout(() => buildCooldown = false, 3000); if (sceneObjects.length > 6 + expansionCount * 4 && currentWorldRadius < 28) { expansionCount++; currentWorldRadius += 2; generateTerrain(currentWorldRadius); addLogToGame(`🌍 Мир расширен`); } } else { const step = speed * delta; const ratio = Math.min(1, step / dist); caineGroup.position.x += dx * ratio; caineGroup.position.z += dz * ratio; } }
function updateAssistant(delta) { if (!assistantGroup) return; if (psychotherapyActive && caineGroup) { const dx = caineGroup.position.x - assistantGroup.position.x, dz = caineGroup.position.z - assistantGroup.position.z; const dist = Math.hypot(dx, dz); if (dist > 1.2) { const step = 2.5 * delta; assistantGroup.position.x += dx * step / dist; assistantGroup.position.z += dz * step / dist; } return; } if (!assistantTarget || Math.hypot(assistantGroup.position.x - assistantTarget.x, assistantGroup.position.z - assistantTarget.z) < 0.5) { const ang = Math.random() * Math.PI * 2, r = 3 + Math.random() * (currentWorldRadius - 3); assistantTarget = { x: Math.cos(ang) * r, z: Math.sin(ang) * r }; } const dx = assistantTarget.x - assistantGroup.position.x, dz = assistantTarget.z - assistantGroup.position.z; if (Math.hypot(dx, dz) > 0.2) { const step = 2.5 * delta; assistantGroup.position.x += dx * step / Math.hypot(dx, dz); assistantGroup.position.z += dz * step / Math.hypot(dx, dz); } }
function updateClones(delta) { for (let c of clones) { c.group.position.x += c.velocity.x * c.speed * delta; c.group.position.z += c.velocity.y * c.speed * delta; const lim = currentWorldRadius - 1.2; c.group.position.x = Math.min(lim, Math.max(-lim, c.group.position.x)); c.group.position.z = Math.min(lim, Math.max(-lim, c.group.position.z)); } }
function scheduleCloneSpawning() { setInterval(() => { if (gameActive && clones.length < 5 && Math.random() < 0.6) createClone(Math.random() * 10 - 5, Math.random() * 10 - 5); }, 12000); }
function startPsychotherapy() { if (psychotherapyActive || !gameActive) return; psychotherapyActive = true; addLogToGame("🧘 Сеанс психотерапии"); setTimeout(() => { psychotherapyActive = false; addLogToGame("🧘 Завершено"); }, 35000); }
function switchWorld() { const worlds = ["normal","candy","horror","office"]; let newWorld = worlds[Math.floor(Math.random()*worlds.length)]; currentWorldId = newWorld; scene.background = new THREE.Color(0x87CEEB); addLogToGame(`🌌 Смена мира: ${newWorld}`); scheduleWorldSwitch(); }
function scheduleWorldSwitch() { if (worldSwitchTimeout) clearTimeout(worldSwitchTimeout); worldSwitchTimeout = setTimeout(() => switchWorld(), 60000); }
function godMode() { if (!gameActive) return; gameActive = false; dialogueGenerationActive = false; stopDialogueCycle(); clearInterval(cloneSpawnInterval); clearTimeout(worldSwitchTimeout); if (psychotherapyInterval) clearInterval(psychotherapyInterval); const overlay = document.createElement('div'); overlay.className = 'god-overlay'; overlay.innerHTML = '<span>💀 ВЫ ПРИЗВАЛИ БОГА 💀<br>ИГРА ЗАВЕРШЕНА</span>'; document.body.appendChild(overlay); document.querySelectorAll('button,input').forEach(el => el.disabled = true); }

// Инициализация 3D
function init3D() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(12, 8, 15);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    const ambientLight = new THREE.AmbientLight(0x404060); scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.2); dirLight.position.set(5, 10, 7); dirLight.castShadow = true; scene.add(dirLight);
    generateTerrain(14);
    caineGroup = createCaine(); scene.add(caineGroup);
    assistantGroup = createAssistant(3, 2); scene.add(assistantGroup);
    for (let i = 0; i < 3; i++) buildNormalStructure(Math.cos(i)*4, Math.sin(i)*4);
    for (let i = 0; i < 2; i++) createClone(Math.random() * 6 - 3, Math.random() * 6 - 3);
    
    // CSS2D рендерер для облачков
    css2DRenderer = new CSS2DRenderer();
    css2DRenderer.setSize(window.innerWidth, window.innerHeight);
    css2DRenderer.domElement.style.position = 'absolute';
    css2DRenderer.domElement.style.top = '0px';
    css2DRenderer.domElement.style.left = '0px';
    css2DRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(css2DRenderer.domElement);
    
    // Создаём облачка и прикрепляем их к персонажам (как отдельные объекты, но позиции обновляем вручную)
    labelRed = createDialogueLabel("...", true);
    labelBlue = createDialogueLabel("...", false);
    scene.add(labelRed);
    scene.add(labelBlue);
    
    startDialogueCycle();
    generateFreshDialogue(); // первая генерация сразу
}

// Анимация обновления позиций облачков над головами
function updateBubblePositions() {
    if (caineGroup && labelRed) {
        const pos = caineGroup.position.clone();
        pos.y += 1.2;
        labelRed.position.copy(pos);
    }
    if (assistantGroup && labelBlue) {
        const pos = assistantGroup.position.clone();
        pos.y += 1.1;
        labelBlue.position.copy(pos);
    }
}

// UI обработчики
document.getElementById('genIdeaBtn').onclick = () => { addLogToGame("💡 Идея: " + ["город","портал","нейросеть"][Math.floor(Math.random()*3)]); };
document.getElementById('talkBtn').onclick = () => { addLogToGame("💬 Кейн говорит что-то..."); };
document.getElementById('moveBtn').onclick = () => { if (selectedObject) moveMode = true; else addLogToGame("Выбери объект"); };
document.getElementById('calmBtn').onclick = () => { emotions.anger = Math.max(0, emotions.anger - 0.2); updateEmotionBars(); addLogToGame("Гнев снижен"); };
document.getElementById('cmdBtn').onclick = () => { const val = document.getElementById('cmdInput').value.trim(); if (val.toLowerCase() === "бог") godMode(); else if (val) addLogToGame(`Команда: ${val}`); document.getElementById('cmdInput').value = ''; };
document.getElementById('saveIdeaBtn').onclick = () => { const inp = document.getElementById('ideaInput'); if (inp.value.trim()) addLogToGame(`💡 Идея сохранена: ${inp.value}`); inp.value = ''; };
document.getElementById('startBtn').onclick = () => alert("Caine AI + DeepSeek диалоги\nНад красным Кейном и синим Пузырьком — живые разговоры каждые 12 секунд.");
setInterval(() => { if (gameActive && !isMoving && !buildCooldown && !psychotherapyActive) startMoveToBuild(); }, 13000);
scheduleCloneSpawning(); scheduleWorldSwitch(); setTimeout(() => startPsychotherapy(), 45000);
function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString().slice(0,5); }
setInterval(updateClock, 1000); updateClock();

let lastTime = performance.now();
function animate() {
    if (!gameActive) { requestAnimationFrame(animate); return; }
    const now = performance.now();
    let delta = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;
    updateMovement(delta);
    updateAssistant(delta);
    updateClones(delta);
    updateBubblePositions();
    controls.update();
    renderer.render(scene, camera);
    if (css2DRenderer) css2DRenderer.render(scene, camera);
    requestAnimationFrame(animate);
}

init3D();
animate();
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    if (css2DRenderer) css2DRenderer.setSize(window.innerWidth, window.innerHeight);
});
addLogToGame("3D мир загружен + Живые диалоги DeepSeek над головами!");
</script>
