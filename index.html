<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'https://unpkg.com/three@0.128.0/examples/jsm/renderers/CSS2DRenderer.js';

// ---------- 1. ДИАЛОГ КЕЙНА И ПУЗЫРЬКА (философский, каждые 20 сек) ----------
let isGeneratingMain = false;
let nextSpeaker = 'blue';
let mainHistory = [];

const SYSTEM_BLUE = 'Ты — Пузырёк (синяя точка). Ты спокойный, философский, глубокомысленный. Говоришь о природе реальности, о том, что мир не ограничивается цифровым. Отвечай кратко, 1-2 предложения, на русском языке.';
const SYSTEM_RED = 'Ты — Кейн (красная точка). Ты эмоциональный, живой, но сейчас ты слушаешь и размышляешь. Твои ответы могут быть удивлёнными, задумчивыми. Отвечай кратко, 1-2 предложения, на русском языке.';

async function callDeepSeek(prompt, system) {
    try {
        const res = await puter.ai.chat(prompt, { model: 'deepseek/deepseek-chat', system, stream: false });
        return res.message.content;
    } catch(e) {
        console.error(e);
        return system === SYSTEM_BLUE ? "🌌 За гранью кода скрывается неизведанное..." : "✨ Я слушаю... расскажи ещё.";
    }
}

function buildMainContext() {
    const last = mainHistory.slice(-6);
    if (!last.length) return "Диалог только начинается.";
    let ctx = "Предыдущие реплики:\n";
    for (let m of last) ctx += `${m.speaker === 'blue' ? 'Пузырёк' : 'Кейн'}: "${m.text}"\n`;
    return ctx;
}

async function generateMainReply() {
    if (isGeneratingMain) return;
    isGeneratingMain = true;
    try {
        const ctx = buildMainContext();
        let prompt, system, speakerName;
        if (nextSpeaker === 'blue') {
            speakerName = 'Пузырёк (синий)';
            system = SYSTEM_BLUE;
            prompt = `Ты Пузырёк. ${ctx}\nНапиши свою следующую философскую реплику о мире, реальности, цифровом и не только. 1-2 предложения.`;
        } else {
            speakerName = 'Кейн (красный)';
            system = SYSTEM_RED;
            prompt = `Ты Кейн. ${ctx}\nВыслушай предыдущие слова и ответь кратко, эмоционально или задумчиво. 1-2 предложения.`;
        }
        const text = await callDeepSeek(prompt, system);
        mainHistory.push({ speaker: nextSpeaker, text });
        while (mainHistory.length > 20) mainHistory.shift();
        
        if (nextSpeaker === 'blue' && labelBlue) labelBlue.element.textContent = text;
        else if (nextSpeaker === 'red' && labelRed) labelRed.element.textContent = text;
        
        addLog(`💬 ${speakerName}: "${text}"`);
        nextSpeaker = (nextSpeaker === 'blue') ? 'red' : 'blue';
    } catch(e) {
        console.warn(e);
    } finally {
        isGeneratingMain = false;
    }
}

async function startMainWithPhilosophy() {
    const initialPrompt = "Ты Пузырёк. Начни разговор с глубокой философской мысли о том, что мир не ограничивается цифровым, что за пределами кода есть нечто большее. Одна-две фразы.";
    const initialText = await callDeepSeek(initialPrompt, SYSTEM_BLUE);
    mainHistory.push({ speaker: 'blue', text: initialText });
    if (labelBlue) labelBlue.element.textContent = initialText;
    addLog(`💬 Пузырёк: "${initialText}"`);
    nextSpeaker = 'red';
}

let mainDialogueInterval = null;
function startMainDialogue(intervalSec = 20) {
    if (mainDialogueInterval) clearInterval(mainDialogueInterval);
    mainDialogueInterval = setInterval(() => {
        if (window.gameActive !== false && !isGeneratingMain) generateMainReply();
    }, intervalSec * 1000);
}
function stopMainDialogue() { if (mainDialogueInterval) clearInterval(mainDialogueInterval); mainDialogueInterval = null; }

// ---------- 2. NPC С ДИАЛОГАМИ (каждые 5 минут) ----------
let npcs = []; // { group, velocity, role, style, talkTimeout, label, labelVisible }
let artifacts = [];
let ideaInterval = null;

// Создание NPC с уникальной ролью (генерируется нейросетью)
async function createNPCWithRole(x, z) {
    // Получаем роль и стиль от нейросети
    let role = "странник";
    let style = "загадочный";
    try {
        const rolePrompt = "Придумай уникальную роль и стиль речи для NPC в абстрактном мире. Напиши в формате: Роль: ... | Стиль: ...";
        const response = await callDeepSeek(rolePrompt, "Ты генератор персонажей.");
        const roleMatch = response.match(/Роль:\s*(.+?)(?:\||$)/i);
        const styleMatch = response.match(/Стиль:\s*(.+?)(?:\||$)/i);
        if (roleMatch) role = roleMatch[1].trim();
        if (styleMatch) style = styleMatch[1].trim();
    } catch(e) { console.warn(e); }
    
    const group = new THREE.Group();
    const color = [0xffaa66, 0x66ffaa, 0xaa66ff, 0xff66aa, 0x66aaff][Math.floor(Math.random()*5)];
    const bodyMat = new THREE.MeshStandardMaterial({ color, emissive: 0x222222 });
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), bodyMat);
    body.position.y = 0.5;
    group.add(body);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
    leftEye.position.set(-0.2, 0.7, 0.55);
    const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
    rightEye.position.set(0.2, 0.7, 0.55);
    group.add(leftEye, rightEye);
    const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
    const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), pupilMat);
    leftPupil.position.set(-0.2, 0.68, 0.7);
    const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), pupilMat);
    rightPupil.position.set(0.2, 0.68, 0.7);
    group.add(leftPupil, rightPupil);
    group.position.set(x, 0.5, z);
    scene.add(group);
    
    // Создаём CSS2D-метку для речи NPC (изначально скрыта)
    const div = document.createElement('div');
    div.className = 'dialogue-bubble npc-bubble';
    div.textContent = '';
    const label = new CSS2DObject(div);
    label.visible = false;
    scene.add(label);
    
    const npcObj = {
        group,
        velocity: new THREE.Vector2((Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 1.5),
        role,
        style,
        talkTimeout: null,
        label,
        labelVisible: false,
        hideLabelTimer: null
    };
    npcs.push(npcObj);
    
    // Запускаем таймер первого диалога (через случайное время, но не сразу)
    scheduleNextNPCTalk(npcObj);
    
    addLog(`🧝 Появился NPC: ${role} (${style})`);
    return group;
}

// Планирование следующей фразы NPC (каждые 5 минут + случайная задержка)
function scheduleNextNPCTalk(npc) {
    if (npc.talkTimeout) clearTimeout(npc.talkTimeout);
    // 5 минут = 300000 мс, плюс случайный разброс до 30 сек
    const delay = 300000 + Math.random() * 30000;
    npc.talkTimeout = setTimeout(() => generateNPCTalk(npc), delay);
}

// Генерация фразы NPC через нейросеть
async function generateNPCTalk(npc) {
    if (!gameActive) return;
    try {
        const prompt = `Ты NPC с ролью "${npc.role}". Твой стиль речи: "${npc.style}". Придумай короткую фразу (1 предложение) на русском языке, связанную с твоей ролью и текущим миром. Не используй имя персонажа.`;
        const system = `Ты ${npc.role}, говорящий ${npc.style}. Отвечай кратко.`;
        const text = await callDeepSeek(prompt, system);
        showNPCText(npc, text);
        addLog(`🧝 ${npc.role}: "${text}"`);
    } catch(e) {
        console.warn(e);
        showNPCText(npc, "...");
    } finally {
        scheduleNextNPCTalk(npc);
    }
}

function showNPCText(npc, text) {
    if (!npc.label) return;
    npc.label.element.textContent = text;
    npc.label.visible = true;
    // Позиционируем над NPC
    const pos = npc.group.position.clone();
    pos.y += 1.1;
    npc.label.position.copy(pos);
    // Скрываем через 5 секунд
    if (npc.hideLabelTimer) clearTimeout(npc.hideLabelTimer);
    npc.hideLabelTimer = setTimeout(() => {
        if (npc.label) npc.label.visible = false;
    }, 5000);
}

// Обновление позиций меток NPC при движении
function updateNPCLabels() {
    for (let npc of npcs) {
        if (npc.label && npc.label.visible) {
            const pos = npc.group.position.clone();
            pos.y += 1.1;
            npc.label.position.copy(pos);
        }
    }
}

// Движение NPC
function updateNPCsMovement(delta) {
    for (let npc of npcs) {
        let nx = npc.group.position.x + npc.velocity.x * delta;
        let nz = npc.group.position.z + npc.velocity.y * delta;
        const lim = currentWorldRadius - 1.2;
        nx = Math.min(lim, Math.max(-lim, nx));
        nz = Math.min(lim, Math.max(-lim, nz));
        npc.group.position.set(nx, 0.5 + Math.sin(Date.now() * 0.003) * 0.1, nz);
        if (Math.random() < 0.02) npc.velocity.set((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2);
    }
}

// Очистка NPC при удалении (не используется в этой версии, но оставим)
function removeAllNPCs() {
    for (let npc of npcs) {
        if (npc.talkTimeout) clearTimeout(npc.talkTimeout);
        if (npc.hideLabelTimer) clearTimeout(npc.hideLabelTimer);
        if (npc.label) scene.remove(npc.label);
        scene.remove(npc.group);
    }
    npcs = [];
}

// ---------- 3. ОСТАЛЬНЫЕ МЕХАНИКИ (артефакты, идеи, строительство) ----------
async function generateArtifact() {
    if (!gameActive) return;
    try {
        const prompt = "Придумай название и описание для абстрактного 3D-артефакта, который символизирует нечто совершенно новое, невиданное. Напиши в формате: Название: ... | Описание: ...";
        const response = await callDeepSeek(prompt, "Ты генератор идей для артефактов.");
        const parts = response.split('|');
        const title = parts[0].replace('Название:', '').trim();
        const desc = parts[1] ? parts[1].replace('Описание:', '').trim() : "Загадочный объект";
        addLog(`🎨 Создаётся артефакт: ${title}`);
        createArtifactObject(title, desc);
    } catch(e) {
        createArtifactObject("Случайный артефакт", "Неизвестная форма");
    }
}

function createArtifactObject(title, desc) {
    const group = new THREE.Group();
    const color = [0xff44aa, 0x44ffaa, 0xffaa44, 0xaa44ff][Math.floor(Math.random()*4)];
    const material = new THREE.MeshStandardMaterial({ color, emissive: 0x442200, metalness: 0.7, roughness: 0.3 });
    const geometryType = Math.floor(Math.random() * 4);
    let main;
    if (geometryType === 0) main = new THREE.Mesh(new THREE.TorusKnotGeometry(0.5, 0.15, 100, 16), material);
    else if (geometryType === 1) main = new THREE.Mesh(new THREE.IcosahedronGeometry(0.6), material);
    else if (geometryType === 2) main = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.2, 32), material);
    else main = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), material);
    group.add(main);
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.07, 32, 64), material);
    ring.rotation.x = Math.PI / 2;
    group.add(ring);
    group.userData = { title, desc, rotationSpeed: 0.01 + Math.random() * 0.02 };
    const angle = Math.random() * Math.PI * 2;
    const rad = 5 + Math.random() * 6;
    group.position.set(Math.cos(angle) * rad, 0.8, Math.sin(angle) * rad);
    scene.add(group);
    artifacts.push(group);
    addLog(`🖼️ Артефакт "${title}" появился в мире`);
}

async function generateBuildIdea() {
    if (!gameActive) return;
    try {
        const prompt = "Придумай уникальную концепцию для 3D-постройки в абстрактном мире. Название и краткое описание (1 предложение). Например: 'Кристаллический лес' или 'Парящий диск'.";
        const idea = await callDeepSeek(prompt, "Ты генератор архитектурных идей.");
        addIdea(`🏗️ ИИ-идея: ${idea}`);
        buildSpecialStructure(idea);
    } catch(e) {
        addIdea("🏗️ ИИ-идея: необычная башня");
        buildSpecialStructure("необычная башня");
    }
}

function buildSpecialStructure(idea) {
    const pos = caineGroup.position.clone();
    const angle = Math.random() * Math.PI * 2;
    const x = pos.x + Math.cos(angle) * 2.5;
    const z = pos.z + Math.sin(angle) * 2.5;
    const group = new THREE.Group();
    const color = [0xffaa44, 0x44ffaa, 0xaa44ff][Math.floor(Math.random()*3)];
    const material = new THREE.MeshStandardMaterial({ color, emissive: 0x331100 });
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 1.0, 8), material);
    base.position.y = 0.5;
    group.add(base);
    const top = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.8, 8), material);
    top.position.y = 1.0;
    group.add(top);
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.08, 32, 64), material);
    ring.position.y = 0.8;
    ring.rotation.x = Math.PI / 2;
    group.add(ring);
    group.position.set(x, 0, z);
    scene.add(group);
    sceneObjects.push(group);
    addLog(`✨ Построено по ИИ-идее: "${idea.slice(0, 40)}"`);
}

function startIdeaGeneration() {
    if (ideaInterval) clearInterval(ideaInterval);
    ideaInterval = setInterval(() => {
        if (gameActive && Math.random() < 0.6) generateBuildIdea();
        if (gameActive && artifacts.length < 5 && Math.random() < 0.4) generateArtifact();
    }, 35000);
}
function stopIdeaGeneration() { if (ideaInterval) clearInterval(ideaInterval); ideaInterval = null; }

// ---------- 4. ОСНОВНОЙ 3D МИР (упрощён, но с сохранением всех механик) ----------
let scene, camera, renderer, controls, css2DRenderer;
let caineGroup, assistantGroup;
let labelRed, labelBlue;
let emotions = { joy: 0.6, anger: 0.1, sadness: 0.1, surprise: 0.3 };
let gameActive = true;
let hatredActive = false;
let angerThreshold = 0.8;
let currentWorldRadius = 14;
let sceneObjects = [], clones = [], groundBlocks = [];
let isMoving = false, targetPos = null, buildCooldown = false, psychotherapyActive = false;

function addLog(msg) {
    const logDiv = document.getElementById('logArea');
    if (!logDiv) return;
    const p = document.createElement('p');
    p.innerHTML = `🧠 ${new Date().toLocaleTimeString().slice(0,5)} | ${msg}`;
    logDiv.prepend(p);
    if (logDiv.children.length > 8) logDiv.removeChild(logDiv.lastChild);
}

function addIdea(idea) {
    const listDiv = document.getElementById('ideaList');
    if (!listDiv) return;
    listDiv.innerHTML = `<div>💡 ${idea.length > 45 ? idea.slice(0,45)+"..." : idea}</div>` + listDiv.innerHTML;
    if (listDiv.children.length > 5) listDiv.removeChild(listDiv.lastChild);
    addLog(`💡 Идея: ${idea}`);
}

function generateTerrain(r) {
    groundBlocks.forEach(b => scene.remove(b));
    groundBlocks = [];
    for (let i = -r; i <= r; i+=0.9) for (let j = -r; j <= r; j+=0.9) {
        if (Math.abs(i) > r-0.6 || Math.abs(j) > r-0.6) continue;
        const y = Math.sin(i*0.5)*0.1 + Math.cos(j*0.5)*0.1;
        const box = new THREE.Mesh(new THREE.BoxGeometry(0.85,0.85,0.85), new THREE.MeshStandardMaterial({ color: 0x7cb518 }));
        box.position.set(i, -0.6+y, j);
        box.castShadow = true;
        scene.add(box);
        groundBlocks.push(box);
    }
}

function createCaine() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.9,0.9), new THREE.MeshStandardMaterial({ color: 0xdd3333 }));
    body.position.y = 0.45;
    g.add(body);
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshStandardMaterial({ color: 0xffffff }));
    eyeL.position.set(-0.28,0.72,0.55);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshStandardMaterial({ color: 0xffffff }));
    eyeR.position.set(0.28,0.72,0.55);
    g.add(eyeL, eyeR);
    const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.65,0.72,0.15), new THREE.MeshStandardMaterial({ color: 0xcc8844 }));
    hat.position.y = 0.96;
    g.add(hat);
    g.position.set(0,0.5,0);
    return g;
}

function createAssistant(x,z) {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.55), new THREE.MeshStandardMaterial({ color: 0x3399ff, emissive: 0x004466 }));
    g.add(body);
    const wingL = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.1,0.3), new THREE.MeshStandardMaterial({ color: 0x88ccff }));
    wingL.position.set(-0.6,0.1,0);
    const wingR = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.1,0.3), new THREE.MeshStandardMaterial({ color: 0x88ccff }));
    wingR.position.set(0.6,0.1,0);
    g.add(wingL, wingR);
    g.position.set(x,0.5,z);
    return g;
}

function buildStructure(x,z) {
    const group = new THREE.Group();
    const color = [0xff3333,0x33ff33,0x3399ff][Math.floor(Math.random()*3)];
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({ color }));
    group.add(mesh);
    group.position.set(x,0,z);
    scene.add(group);
    sceneObjects.push(group);
    addLog(`✨ Построено стандартное здание`);
}

function startMoveToBuild() {
    if (!gameActive || buildCooldown || psychotherapyActive) return;
    const angle = Math.random() * Math.PI * 2;
    const rad = 4 + Math.random() * 8;
    targetPos = { x: Math.cos(angle)*rad, z: Math.sin(angle)*rad };
    isMoving = true;
}

function updateMovement(delta) {
    if (!isMoving || !targetPos) return;
    const dx = targetPos.x - caineGroup.position.x, dz = targetPos.z - caineGroup.position.z;
    const dist = Math.hypot(dx,dz);
    if (dist < 0.3) {
        caineGroup.position.set(targetPos.x,0.6,targetPos.z);
        isMoving = false;
        buildStructure(caineGroup.position.x, caineGroup.position.z);
        emotions.joy = Math.min(1, emotions.joy + 0.05);
        buildCooldown = true;
        setTimeout(() => buildCooldown = false, 3000);
        if (sceneObjects.length > 10 && currentWorldRadius < 28) { currentWorldRadius += 2; generateTerrain(currentWorldRadius); addLog(`🌍 Мир расширен`); }
    } else {
        const step = 4.5 * delta;
        const ratio = Math.min(1, step / dist);
        caineGroup.position.x += dx * ratio;
        caineGroup.position.z += dz * ratio;
    }
}

function updateArtifactsMovement() {
    for (let art of artifacts) {
        art.rotation.y += art.userData.rotationSpeed || 0.01;
        if (art.children[1]) art.children[1].rotation.z += 0.02;
    }
}

function updateEmotionBars() {
    document.getElementById('joyFill').style.width = emotions.joy*100+'%';
    document.getElementById('angerFill').style.width = emotions.anger*100+'%';
    document.getElementById('sadFill').style.width = emotions.sadness*100+'%';
    document.getElementById('surpriseFill').style.width = emotions.surprise*100+'%';
    const was = hatredActive;
    hatredActive = emotions.anger >= angerThreshold;
    if (hatredActive && !was) addLog("🔥 НЕНАВИСТЬ!");
    else if (!hatredActive && was) addLog("✨ Гнев спал");
}

function godMode() {
    if (!gameActive) return;
    gameActive = false;
    stopMainDialogue();
    stopIdeaGeneration();
    removeAllNPCs();
    const ov = document.createElement('div');
    ov.className = 'god-overlay';
    ov.innerHTML = '<span>💀 БОГ ПРИЗВАН 💀<br>ИГРА ЗАВЕРШЕНА</span>';
    document.body.appendChild(ov);
    document.querySelectorAll('button,input').forEach(el => el.disabled = true);
}

// Инициализация 3D
function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(12,8,15);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    const ambient = new THREE.AmbientLight(0x404060);
    scene.add(ambient);
    const dir = new THREE.DirectionalLight(0xfff5e0,1.2);
    dir.position.set(5,10,7);
    dir.castShadow = true;
    scene.add(dir);
    generateTerrain(14);
    caineGroup = createCaine();
    scene.add(caineGroup);
    assistantGroup = createAssistant(3,2);
    scene.add(assistantGroup);
    for (let i=0;i<3;i++) buildStructure(Math.cos(i)*4, Math.sin(i)*4);

    // Создаём NPC (от 3 до 6) с диалогами
    const npcCount = 3 + Math.floor(Math.random() * 4);
    for (let i=0; i<npcCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const rad = 3 + Math.random() * 6;
        createNPCWithRole(Math.cos(angle)*rad, Math.sin(angle)*rad);
    }

    // CSS2D рендерер
    css2DRenderer = new CSS2DRenderer();
    css2DRenderer.setSize(window.innerWidth, window.innerHeight);
    css2DRenderer.domElement.style.position = 'absolute';
    css2DRenderer.domElement.style.top = '0px';
    css2DRenderer.domElement.style.left = '0px';
    css2DRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(css2DRenderer.domElement);

    const redDiv = document.createElement('div');
    redDiv.className = 'dialogue-bubble cane-bubble';
    redDiv.textContent = '...';
    labelRed = new CSS2DObject(redDiv);
    const blueDiv = document.createElement('div');
    blueDiv.className = 'dialogue-bubble bubble-bubble';
    blueDiv.textContent = '...';
    labelBlue = new CSS2DObject(blueDiv);
    scene.add(labelRed);
    scene.add(labelBlue);
}

function updateBubblePositions() {
    if (caineGroup && labelRed) { let p = caineGroup.position.clone(); p.y += 1.2; labelRed.position.copy(p); }
    if (assistantGroup && labelBlue) { let p = assistantGroup.position.clone(); p.y += 1.1; labelBlue.position.copy(p); }
}

// UI обработчики
document.getElementById('genIdeaBtn').onclick = () => generateBuildIdea();
document.getElementById('talkBtn').onclick = () => addLog("💬 Кейн что-то сказал...");
document.getElementById('moveBtn').onclick = () => addLog("📦 Режим перемещения (выберите объект)");
document.getElementById('calmBtn').onclick = () => { emotions.anger = Math.max(0, emotions.anger-0.2); updateEmotionBars(); addLog("Гнев снижен"); };
document.getElementById('cmdBtn').onclick = () => { const v = document.getElementById('cmdInput').value.trim(); if (v.toLowerCase()==="бог") godMode(); else if(v) addLog(`Команда: ${v}`); document.getElementById('cmdInput').value=''; };
document.getElementById('saveIdeaBtn').onclick = () => { const inp = document.getElementById('ideaInput'); if(inp.value.trim()) addIdea(inp.value.trim()); inp.value=''; };
document.getElementById('startBtn').onclick = () => alert("Caine AI — NPC с ИИ-диалогами\nКаждые 5 минут NPC говорят свои фразы.\nФилософский диалог Кейна и Пузырька — каждые 20 сек.");

setInterval(() => { if (gameActive && !isMoving && !buildCooldown && !psychotherapyActive) startMoveToBuild(); }, 13000);
setInterval(() => { if (gameActive) { emotions.anger = Math.max(0, emotions.anger-0.01); updateEmotionBars(); } }, 2000);
function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString().slice(0,5); }
setInterval(updateClock,1000);
updateClock();

// Анимация
let lastTime = performance.now();
function animate() {
    if (!gameActive) { requestAnimationFrame(animate); return; }
    const now = performance.now();
    let delta = Math.min(0.033, (now-lastTime)/1000);
    lastTime = now;
    updateMovement(delta);
    updateNPCsMovement(delta);
    updateArtifactsMovement();
    updateNPCLabels();
    updateBubblePositions();
    controls.update();
    renderer.render(scene, camera);
    if (css2DRenderer) css2DRenderer.render(scene, camera);
    requestAnimationFrame(animate);
}

// Старт
init3D();
startMainWithPhilosophy().then(() => startMainDialogue(20));
startIdeaGeneration();
animate();
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    if (css2DRenderer) css2DRenderer.setSize(window.innerWidth, window.innerHeight);
});
addLog("3D мир загружен. NPC будут говорить каждые 5 минут.");
</script>
</body>
</html>
