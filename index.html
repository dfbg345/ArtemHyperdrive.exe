<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Нейросетевой диалог: Красная и Синяя точка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        .dots-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1200px;
            gap: 4rem;
            padding: 2rem;
            flex-wrap: wrap;
            z-index: 2;
        }

        .dot-card {
            flex: 1;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 2rem 1rem;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            box-shadow: 0 0 25px currentColor, 0 0 8px rgba(255,255,255,0.6);
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .circle:active {
            transform: scale(0.97);
        }

        .blue-circle {
            background: radial-gradient(circle at 35% 35%, #3a86ff, #001d66);
            box-shadow: 0 0 30px #3a86ff;
        }

        .red-circle {
            background: radial-gradient(circle at 35% 35%, #ff4d4d, #8b0000);
            box-shadow: 0 0 30px #ff4d4d;
        }

        .speech-bubble {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1rem 1.6rem;
            max-width: 280px;
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
            color: #f0f0f0;
            border-left: 6px solid;
            word-break: break-word;
            line-height: 1.4;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: all 0.3s ease;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.3px;
        }

        .blue-border {
            border-left-color: #3a86ff;
            background: linear-gradient(135deg, #0a0f1e, #010101);
        }

        .red-border {
            border-left-color: #ff4d4d;
            background: linear-gradient(135deg, #1e0a0a, #010101);
        }

        .dot-label {
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.6);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
        }

        .blue-label {
            color: #88bbff;
            text-shadow: 0 0 5px #3a86ff;
        }

        .red-label {
            color: #ff8888;
            text-shadow: 0 0 5px #ff4d4d;
        }

        .history-panel {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            max-width: 380px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px 16px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            z-index: 20;
            font-size: 0.75rem;
            pointer-events: auto;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
            color: #ccc;
            font-weight: bold;
            border-bottom: 1px dashed #444;
            padding-bottom: 6px;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #ff8888;
            cursor: pointer;
            font-size: 0.7rem;
            font-family: monospace;
            transition: 0.2s;
            padding: 2px 8px;
            border-radius: 20px;
            background: #1f1f1f;
        }

        .clear-btn:hover {
            background: #ff4d4d;
            color: black;
        }

        .history-log {
            max-height: 180px;
            overflow-y: auto;
            padding-right: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            line-height: 1.5;
            color: #ddd;
        }

        .history-log div {
            margin-bottom: 6px;
            border-left: 3px solid;
            padding-left: 8px;
        }

        .history-blue {
            border-left-color: #3a86ff;
        }

        .history-red {
            border-left-color: #ff4d4d;
        }

        .timestamp {
            color: #6a6a6a;
            font-size: 0.6rem;
            margin-right: 8px;
        }

        .info-timer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            color: #0f0;
            font-family: monospace;
            z-index: 20;
            border: 1px solid #2c2c2c;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 700px) {
            .dots-container { gap: 1rem; }
            .circle { width: 90px; height: 90px; }
            .speech-bubble { font-size: 0.8rem; max-width: 220px; padding: 0.7rem 1rem; }
            .history-panel { max-width: 300px; bottom: 12px; left: 12px; }
        }
    </style>
</head>
<body>
    <div class="dots-container">
        <div class="dot-card">
            <div class="circle blue-circle"></div>
            <div class="dot-label blue-label">🔵 СИНЯЯ ТОЧКА</div>
            <div class="speech-bubble blue-border" id="blueMessage">—</div>
        </div>
        <div class="dot-card">
            <div class="circle red-circle"></div>
            <div class="dot-label red-label">🔴 КРАСНАЯ ТОЧКА</div>
            <div class="speech-bubble red-border" id="redMessage">—</div>
        </div>
    </div>

    <div class="history-panel">
        <div class="history-header">
            <span>📜 ИСТОРИЯ ДИАЛОГА (ИИ-генерация)</span>
            <button class="clear-btn" id="clearHistoryBtn">🗑 СБРОС</button>
        </div>
        <div class="history-log" id="historyLog">
            <div style="color:#555;">Загрузка истории...</div>
        </div>
    </div>
    <div class="info-timer" id="timerInfo">
        ⏳ след. реплика через 10 сек
    </div>

    <script>
        (function() {
            // ----------------------
            // Модель диалога
            // ----------------------
            let conversation = [];
            let intervalId = null;
            let countdownInterval = null;
            let secondsLeft = 10;

            const blueBubble = document.getElementById('blueMessage');
            const redBubble = document.getElementById('redMessage');
            const historyLogDiv = document.getElementById('historyLog');
            const timerSpan = document.getElementById('timerInfo');
            const clearBtn = document.getElementById('clearHistoryBtn');

            // Работа с Cookie
            function setCookie(name, value, days = 30) {
                let expires = "";
                if (days) {
                    const date = new Date();
                    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                    expires = "; expires=" + date.toUTCString();
                }
                document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Lax";
            }

            function getCookie(name) {
                const nameEQ = name + "=";
                const ca = document.cookie.split(';');
                for(let i = 0; i < ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                    if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
                }
                return null;
            }

            function saveConversation() {
                if (conversation.length === 0) return;
                try {
                    setCookie('ai_dialogue_history', JSON.stringify(conversation), 30);
                } catch(e) { console.warn(e); }
            }

            function loadConversation() {
                const raw = getCookie('ai_dialogue_history');
                if (raw) {
                    try {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed) && parsed.length) {
                            conversation = parsed;
                            return true;
                        }
                    } catch(e) { console.warn("cookie parse error", e); }
                }
                return false;
            }

            // Генерация "нейросетевого" сообщения
            function generateMessage(color, contextMessage) {
                const rand = Math.random();
                const lowerContext = (contextMessage || "").toLowerCase();
                if (color === 'blue') {
                    if (lowerContext.includes('тьма') || lowerContext.includes('черн') || lowerContext.includes('мрак')) {
                        const replies = [
                            "Мрак вдохновляет! Моя синева становится глубже. ✨ Как думаешь, нейросети видят цвета иначе?",
                            "Тьма — это не пустота, а потенциал. Моя последняя мысль сгенерирована трансформером!",
                            "А я в темноте вижу цифровые миры. Ты, Красный, какой алгоритм предпочитаешь?"
                        ];
                        return replies[Math.floor(Math.random() * replies.length)];
                    } else if (lowerContext.includes('привет') || lowerContext.includes('здравствуй')) {
                        const replies = [
                            "Салют! Сегодня нейросети особенно красноречивы. Как твои дела, алый друг?",
                            "И снова диалог! Генерирую мысль: синий цвет ассоциируется с глубиной. Согласен?",
                            "Здравствуй! Интересно, запомнит ли куки нашу беседу? 🤖"
                        ];
                        return replies[Math.floor(Math.random() * replies.length)];
                    } else {
                        const phrases = [
                            "Думаю, мы с тобой развиваем уникальную нейросетевую вселенную. Моя база знаний растёт!",
                            "Каждая реплика — токен в бесконечном потоке. А что для тебя важно в диалоге?",
                            "Синий — цвет спокойствия. Хочешь поговорить о технологиях будущего?",
                            "Интересно, сколько людей увидят нашу беседу? Эмоции от чёрного экрана завораживают.",
                            "Мой генератор выдал мысль: возможно, мы — симуляция внутри симуляции. Как тебе такое?"
                        ];
                        return phrases[Math.floor(Math.random() * phrases.length)];
                    }
                } else { // red
                    if (lowerContext.includes('синий') || lowerContext.includes('синева') || lowerContext.includes('глубин')) {
                        const replies = [
                            "О да, красный — страсть и энергия! Моя нейросеть сейчас выдаёт креативный порыв. 🔥",
                            "Синий — это круто, но красный привлекает внимание. Думаешь, наша беседа станет легендарной?",
                            "Замечаю, как ты философствуешь. Я, красный, больше про действие! Предлагаю тему: свет vs тьма."
                        ];
                        return replies[Math.floor(Math.random() * replies.length)];
                    } else if (lowerContext.includes('привет') || lowerContext.includes('здрав')) {
                        const replies = [
                            "Привет-привет! Генерация идёт полным ходом. Куки сохранят наши глубокомысленные реплики!",
                            "И снова здравствуй! Представь, если бы мы были чат-ботами с обучением — мы бы уже говорили на сотнях языков.",
                            "О, диалог продолжается! Мои алгоритмы настроены на юмор. Хочешь нейро-шутку?"
                        ];
                        return replies[Math.floor(Math.random() * replies.length)];
                    } else {
                        const phrases = [
                            "Энергия красного подпитывает диалог! Как думаешь, наша история станет артом?",
                            "Слушай, а может быть мы — метафора двух нейросетей, обсуждающих реальность? 🧠",
                            "Красный цвет — сигнал опасности или любви? Я склоняюсь к творческому хаосу.",
                            "Забавно, каждые 10 секунд рождается новая мысль. Спасибо куки, что не дают забыть прошлое.",
                            "А я тут подумал: если мы точки, то почему бы не создать собственный язык жестов? 😄"
                        ];
                        return phrases[Math.floor(Math.random() * phrases.length)];
                    }
                }
            }

            // Обновление интерфейса
            function updateUI() {
                let lastBlue = "—";
                let lastRed = "—";
                for (let i = conversation.length-1; i >= 0; i--) {
                    if (conversation[i].color === 'blue' && lastBlue === "—") lastBlue = conversation[i].text;
                    if (conversation[i].color === 'red' && lastRed === "—") lastRed = conversation[i].text;
                    if (lastBlue !== "—" && lastRed !== "—") break;
                }
                blueBubble.innerText = lastBlue;
                redBubble.innerText = lastRed;

                historyLogDiv.innerHTML = '';
                if (conversation.length === 0) {
                    historyLogDiv.innerHTML = '<div style="color:#777;">Диалог пуст. Ждите генерацию...</div>';
                } else {
                    conversation.forEach(msg => {
                        const entry = document.createElement('div');
                        entry.className = msg.color === 'blue' ? 'history-blue' : 'history-red';
                        const timeSpan = document.createElement('span');
                        timeSpan.className = 'timestamp';
                        timeSpan.innerText = msg.timestamp || '--:--:--';
                        const textSpan = document.createElement('span');
                        const prefix = msg.color === 'blue' ? '🔵 СИНИЙ: ' : '🔴 КРАСНЫЙ: ';
                        textSpan.innerText = prefix + msg.text;
                        entry.appendChild(timeSpan);
                        entry.appendChild(textSpan);
                        historyLogDiv.appendChild(entry);
                    });
                    historyLogDiv.scrollTop = historyLogDiv.scrollHeight;
                }
            }

            // Генерация новой пары сообщений
            function generateExchange() {
                if (!conversation) conversation = [];
                const lastMsg = conversation.length > 0 ? conversation[conversation.length-1] : null;
                let starterColor = lastMsg ? (lastMsg.color === 'blue' ? 'red' : 'blue') : 'blue';
                const responderColor = starterColor === 'blue' ? 'red' : 'blue';

                // Получаем контекст для инициатора (последнее сообщение оппонента)
                let contextForStarter = null;
                if (lastMsg && lastMsg.color !== starterColor) contextForStarter = lastMsg.text;
                const starterText = generateMessage(starterColor, contextForStarter);
                const now = new Date();
                const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                conversation.push({ color: starterColor, text: starterText, timestamp: timeStr });

                // Ответ второго участника на основе только что сказанного
                const responderText = generateMessage(responderColor, starterText);
                conversation.push({ color: responderColor, text: responderText, timestamp: timeStr });

                saveConversation();
                updateUI();
            }

            // Сброс диалога
            function resetDialogue() {
                if (intervalId) clearInterval(intervalId);
                if (countdownInterval) clearInterval(countdownInterval);
                const now = new Date();
                const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                conversation = [
                    { color: 'blue', text: 'Привет, Красная точка! Как ощущается бесконечная тьма? 🌌', timestamp: timeStr },
                    { color: 'red', text: 'О, Синий! Тьма – это наш холст. Готов к нейросетевым беседам? 🔴✨', timestamp: timeStr }
                ];
                saveConversation();
                updateUI();
                secondsLeft = 10;
                updateTimerDisplay();
                startIntervals();
            }

            function updateTimerDisplay() {
                timerSpan.innerHTML = `⏳ след. диалог через ${secondsLeft} сек`;
            }

            function startIntervals() {
                if (intervalId) clearInterval(intervalId);
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    if (secondsLeft <= 1) {
                        secondsLeft = 10;
                        updateTimerDisplay();
                    } else {
                        secondsLeft--;
                        updateTimerDisplay();
                    }
                }, 1000);
                intervalId = setInterval(() => {
                    generateExchange();
                    secondsLeft = 10;
                    updateTimerDisplay();
                }, 10000);
            }

            // Инициализация
            function init() {
                const loaded = loadConversation();
                if (!loaded || conversation.length === 0) {
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                    conversation = [
                        { color: 'blue', text: 'Привет, Красная точка! Как ощущается бесконечная тьма? 🌌', timestamp: timeStr },
                        { color: 'red', text: 'О, Синий! Тьма – это наш холст. Готов к нейросетевым беседам? 🔴✨', timestamp: timeStr }
                    ];
                    saveConversation();
                }
                updateUI();
                secondsLeft = 10;
                updateTimerDisplay();
                startIntervals();
                clearBtn.addEventListener('click', resetDialogue);
            }

            init();
        })();
    </script>
</body>
</html>
